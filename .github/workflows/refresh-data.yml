name: Refresh marketing data

on:
  schedule:
    - cron: "30 3 * * *"   # daily, 03:30 UTC (09:00 IST)
  workflow_dispatch:        # manual runs from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch live data (keyless sources)
        run: python run_fetch.py --sources wikipedia,news,trends

      - name: Rebuild dashboard data (for GitHub Pages)
        run: python export_dashboard.py

      - name: Commit refreshed data + dashboard
        run: |
          git config user.name "pulse-360-bot"
          git config user.email "actions@github.com"
          git add data/pulse.db docs/dashboard.json
          git diff --cached --quiet || git commit -m "data: daily refresh $(date -u +%F)"
          git push
